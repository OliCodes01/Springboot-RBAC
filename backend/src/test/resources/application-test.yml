spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

jwt:
  expiration: 86400000

app:
  cors:
    allowed-origins: http://localhost:3000,http://127.0.0.1:3000

server:
  port: 0

