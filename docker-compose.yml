services:
  db:
    image: postgres:16-alpine
    container_name: jwt-app-db
    environment:
      POSTGRES_DB: jwt_app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: jwt-app-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: jwt_app_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_EXPIRATION: 3600000
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:80"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: jwt-app-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
